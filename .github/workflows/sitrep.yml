name: Morning sitrep

# The daily 08:30 SGT earthquake brief, change-gated (Slice 7, issue #10).
#
# Shape (ADR-0001/0002, PRD #3 hybrid scheduling): the DETERMINISTIC scheduler
# (cron) decides when to wake; a DETERMINISTIC gate then decides whether there is
# anything material to republish — calling NO model. The expensive brief/model
# step runs ONLY when the gate says "changed", so the model never decides whether
# to wake. On a no-change run the publish + commit steps are visibly skipped in
# the run log and nothing is republished.
#
# Timezone: GitHub Actions cron is UTC; Singapore is a fixed UTC+8 (no DST), so
# 08:30 SGT == 00:30 UTC exactly. (This supersedes the earlier 00:00-UTC buffer
# scaffold — see implementation-notes.md.)
#
# Secrets (repo → Settings → Secrets and variables → Actions), referenced, never
# hard-coded:
#   * OPENCODE_API_KEY — the model credential the Slice-6 LLM brief consumes.
#   * GITHUB_TOKEN — provided automatically; used to commit the republished brief.

on:
  schedule:
    - cron: "30 0 * * *" # 00:30 UTC daily == 08:30 SGT (fixed UTC+8, no DST)
  workflow_dispatch: {}  # manual run from the Actions tab, green end-to-end

# Commit the republished brief with the built-in token (contents: write).
permissions:
  contents: write

# Never run two briefs at once; let an in-flight brief finish rather than
# cancelling it. This is the brief's single-writer guard on its own paths; the
# fast tick (a separate scheduler) coordinates via disjoint paths + pull --rebase.
concurrency:
  group: morning-sitrep
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        # Full-credential checkout so the guarded commit step can push. The token
        # is the built-in GITHUB_TOKEN (permissions.contents: write above).

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      # (1) Deterministic change-gate — NO model, NO network. Compares the current
      # ledger against the last published snapshot (Slice 5's diff) and writes
      # changed=true|false to $GITHUB_OUTPUT. This is the only thing that decides
      # whether the brief wakes.
      - name: Change-gate (deterministic; no model)
        id: gate
        run: |
          python scripts/change_gate.py \
            --db state/ledger.db \
            --out dashboard.html \
            --published-dir state/published

      # (2) Guarded publish — runs ONLY when the gate signalled a change, so on a
      # no-change run this step is visibly SKIPPED in the run log. It invokes the
      # deterministic brief directly (scripts/brief.py); Slice 6 layers the LLM
      # into the brief behind this same entrypoint (its richer `/sitrep` skill
      # integrates here), so this step's contract does not change.
      - name: Publish the 08:30 brief (guarded by the gate)
        if: steps.gate.outputs.changed == 'true'
        env:
          # Consumed by the Slice-6 LLM brief; the deterministic brief ignores it.
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          python scripts/brief.py \
            --db state/ledger.db \
            --out dashboard.html \
            --published-dir state/published

      # (3) Guarded commit — single-writer: the brief commits only its DISJOINT
      # paths (dashboard.html + today's state/published/<date>.json), never
      # ledger.db, via pull --rebase + retry so it can never clobber the fast
      # tick's binary-DB commit. Skipped on a no-change run.
      - name: Commit the republished brief (disjoint paths, rebase-safe)
        if: steps.gate.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python scripts/commit_state.py --role brief \
            -m "chore(brief): 08:30 sitrep $(date -u +%Y-%m-%dT%H:%M:%SZ)"
